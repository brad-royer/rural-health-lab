#cloud-config
# Ubuntu Server 24.04 LTS autoinstall config — generic lab VM template.
# build-seed-iso.sh fills in the hostname, SSH key, and password placeholders
# below per VM and writes the result to .generated/<hostname>/user-data
# (gitignored — contains a real key/hash).
autoinstall:
  version: 1
  locale: en_US.UTF-8
  keyboard:
    layout: us
  identity:
    hostname: __HOSTNAME__
    username: ubuntu
    password: "__PASSWORD_HASH__"
  ssh:
    install-server: true
    allow-pw: false
    authorized-keys:
      - "__SSH_AUTHORIZED_KEY__"
  storage:
    layout:
      name: direct
  packages:
    - docker.io
    - docker-compose-v2
  late-commands:
    - curtin in-target --target=/target -- usermod -aG docker ubuntu
    - curtin in-target --target=/target -- systemctl enable docker
