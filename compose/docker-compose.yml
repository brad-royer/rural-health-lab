# Phase 1.2 — Postgres-backed HAPI hub
#
# Builds on the Phase 1.1 walking skeleton (single HAPI FHIR R4 server with
# ephemeral in-memory H2). This increment swaps H2 for Postgres so FHIR
# resources survive container restarts/recreation.
#
# - db: postgres:16, named volume `hapi-db-data`, pg_isready healthcheck.
# - hapi-hub: pinned to hapiproject/hapi:v8.10.0-1 (the same build that
#   :latest resolved to when this was first stood up — see
#   docs/runbooks/phase1-hapi-hub.md). Configured via Spring Boot datasource
#   env vars (HAPI_FHIR_* prefix maps to spring.datasource.* / hibernate
#   dialect) to use Postgres instead of the default H2.
# - hapi-hub waits for db to be healthy before starting
#   (depends_on: condition: service_healthy).
#
# Secrets: POSTGRES_PASSWORD comes from compose/.env (gitignored). See
# compose/.env.example for the required variables.
#
# Phase 1.3 — two HAPI spoke instances (issue #5)
#
# - spoke-a, spoke-b: same pinned image as the hub (hapiproject/hapi:v8.10.0-1),
#   each with its own ephemeral in-memory H2 (HAPI's default — no datasource
#   env vars set, no Postgres, no volume). Simulates two lightweight partner
#   EMR FHIR endpoints. Data does NOT survive container recreation — that's
#   intentional for this increment; only the hub is persistent.
# - Each container listens on 8080 internally (the image's fixed default);
#   mapped to distinct host ports 8081 (spoke-a) and 8082 (spoke-b) so all
#   three servers are reachable from the host without colliding.
# - hub and db are unchanged from Phase 1.2.
#
# Phase 2.4 — the CIN's single Mirth Connect instance (issue #13)
#
# - mirth: nextgenhealthcare/connect pinned to 4.5.2 — the last open-source
#   Mirth release (4.6+ went commercial in 2024; Docker Hub tags stop at
#   4.5.2). See docs/adr/0005-gate-c-integration-source-and-direction.md.
# - One instance total (Hard Rule #3, "One Mirth"); Phase 3's federation
#   pattern adds the second instance, not this file.
# - Embedded Derby DB on a named volume. Production delta: real deployments
#   back Mirth with Postgres — documented in the 2.4 runbook.
# - Only the HTTPS admin/API port (8443) is mapped to the host; the hub owns
#   host 8080. Channels reach the hub at http://hapi-hub:8080 over the
#   compose network and Bahmni at https://192.168.1.230 over the LAN.

services:
  db:
    image: postgres:16
    container_name: hapi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hapi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: hapi
    volumes:
      - hapi-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hapi -d hapi"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  hapi-hub:
    image: hapiproject/hapi:v8.10.0-1
    container_name: hapi-hub
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      hapi.fhir.default_encoding: json
      spring.datasource.url: jdbc:postgresql://db:5432/hapi
      spring.datasource.username: hapi
      spring.datasource.password: ${POSTGRES_PASSWORD}
      spring.datasource.driverClassName: org.postgresql.Driver
      spring.jpa.properties.hibernate.dialect: ca.uhn.fhir.jpa.model.dialect.HapiFhirPostgresDialect
      # Phase 3b.1: layer the MDM/subscription overlay on top of the starter
      # defaults (datasource stays above so no secret enters the repo).
      SPRING_CONFIG_ADDITIONAL_LOCATION: file:///configs/application.yaml
    volumes:
      - ./hapi-config:/configs:ro

  spoke-a:
    image: hapiproject/hapi:v8.10.0-1
    container_name: spoke-a
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      hapi.fhir.default_encoding: json

  spoke-b:
    image: hapiproject/hapi:v8.10.0-1
    container_name: spoke-b
    restart: unless-stopped
    ports:
      - "8082:8080"
    environment:
      hapi.fhir.default_encoding: json

  hie-subscriber:
    # Phase 3b.3: receives HAPI rest-hook Encounter notifications (CMS 24h
    # simulation) and timestamps them. Reachable from HAPI on the compose
    # network at http://hie-subscriber:9000.
    build: ./subscriber
    container_name: hie-subscriber
    restart: unless-stopped

  mirth:
    image: nextgenhealthcare/connect:4.5.2
    container_name: mirth
    restart: unless-stopped
    ports:
      - "8443:8443"
    environment:
      VMOPTIONS: -Xmx512m
    volumes:
      - mirth-appdata:/opt/connect/appdata

volumes:
  hapi-db-data:
  mirth-appdata:
