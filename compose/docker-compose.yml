# Phase 1.1 — Walking skeleton
#
# Single HAPI FHIR R4 server acting as the CAH "hub". No Postgres, no spokes,
# no Mirth/Keycloak/Medplum yet — those arrive in later increments.
#
# Storage: in-memory H2 (the image default). No volume is mounted, so all
# data is lost when the container is removed/recreated. Persistent storage
# (Postgres) is planned for the next increment.
#
# Note: the hapiproject/hapi image is a distroless JRE image — there is no
# shell, curl, or wget inside it, so a Docker-native HEALTHCHECK isn't
# practical here. Readiness is verified externally by polling
# /fhir/metadata (see docs/runbooks/phase1-hapi-hub.md).

services:
  hapi-hub:
    image: hapiproject/hapi:latest
    container_name: hapi-hub
    restart: unless-stopped
    ports:
      - "8080:8080"
