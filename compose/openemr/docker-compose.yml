# OpenEMR — the acquired CAH's EHR (Phase 3a, participant #2).
#
# Runs on the rhl-acquired-cah VM (Host #2, 192.168.1.189) - NOT on the HIE
# host. This is the participant-side stack, the OpenEMR analog of Bahmni in
# Phase 2; it onboards to the CIN HIE via the CAH's own Mirth (3a.5), never by
# direct access to HAPI (Hard Rule #1).
#
# Based on the official openemr/openemr production compose, with explicit
# version pins instead of :latest/@sha256 (packaging-drift discipline, per
# Gate H / ADR 0007 - verified against Docker Hub 2026-06-13: 8.1.0 is the
# current stable line). Default credentials (admin/pass, DB root/openemr) are
# lab defaults - flagged to change before anything production-like.
services:
  mysql:
    restart: unless-stopped
    image: mariadb:11.8.8
    command: ['mariadbd', '--character-set-server=utf8mb4']
    volumes:
      - databasevolume:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
    healthcheck:
      test: ['CMD', '/usr/local/bin/healthcheck.sh', '--su-mysql', '--connect', '--innodb_initialized']
      start_period: 1m
      start_interval: 10s
      interval: 1m
      timeout: 5s
      retries: 3

  openemr:
    restart: unless-stopped
    image: openemr/openemr:8.1.0
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - logvolume01:/var/log
      - sitevolume:/var/www/localhost/htdocs/openemr/sites
    environment:
      MYSQL_HOST: mysql
      MYSQL_ROOT_PASS: root
      MYSQL_USER: openemr
      MYSQL_PASS: openemr
      OE_USER: admin
      OE_PASS: pass
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ['CMD', '/usr/bin/curl', '--fail', '--insecure', '--location', '--show-error', '--silent', 'https://localhost/meta/health/readyz']
      start_period: 5m
      start_interval: 15s
      interval: 1m
      timeout: 5s
      retries: 3

volumes:
  logvolume01: {}
  sitevolume: {}
  databasevolume: {}
